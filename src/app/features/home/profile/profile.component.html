<div class="flex flex-1 min-h-0 bg-white dark:bg-gray-900">
  <div class="flex flex-col flex-1 min-h-0 bg-white dark:bg-gray-800">
    <!-- Header with back button for mobile -->
    <div class="h-16 px-4 flex items-center justify-between border-b bg-gray-50 dark:bg-gray-700 border-gray-200 dark:border-gray-600 flex-shrink-0">
      <div class="flex items-center gap-3">
        <button *ngIf="isMobile" (click)="goHome()"
                class="p-2 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full transition-colors mr-1">
          <i class="fas fa-arrow-left text-gray-600 dark:text-gray-300"></i>
        </button>
        <h2 class="font-semibold text-gray-800 dark:text-gray-200">Profile</h2>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="flex-1 overflow-y-auto p-4 bg-gray-50 dark:bg-gray-900">
      <div class="max-w-2xl mx-auto">
        <!-- Profile Content -->
        <div class="flex flex-col items-center pt-8 pb-8">
          <img
            [src]="currentUser?.profilePictureUrl || 'assets/google.svg'"
            class="w-40 h-40 rounded-full object-cover shadow-lg"
            alt="profile"
          />
        </div>

        <!-- Profile Details -->
        <div class="space-y-6 pb-8">
          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">Name</label>
            <p class="text-xl font-semibold text-gray-900 dark:text-gray-100 mt-2">{{ currentUser?.displayName }}</p>
          </div>

          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">About</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">{{ currentUser?.about || 'Hey there! I am using WhatsApp.' }}</p>
          </div>

          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">Phone</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">{{ currentUser?.phoneNumber }}</p>
          </div>

          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">Email</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">{{ currentUser?.email }}</p>
          </div>

          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">Username</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">@{{ currentUser?.username }}</p>
          </div>

          <!-- Extra content to force scrolling -->
          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">Additional Info</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">Some extra content</p>
          </div>

          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">More Details</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">More content to test scrolling</p>
          </div>

          <div class="bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 p-6 rounded-lg">
            <label class="text-sm text-gray-500 dark:text-gray-400 font-medium">Last Item</label>
            <p class="text-base text-gray-700 dark:text-gray-300 mt-2">This should be scrollable on mobile</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
