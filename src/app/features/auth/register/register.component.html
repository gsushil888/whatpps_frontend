<div class="min-h-screen flex items-center justify-center bg-whatsapp-gradient-light dark:bg-whatsapp-gradient-dark p-4">
  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden" style="max-height: 95vh;">
    <div class="overflow-y-auto whatsapp-scrollbar" style="max-height: 95vh;">
      <div class="p-6 md:p-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">Create Account</h2>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

          <!-- Profile Picture -->
          <div class="flex justify-center">
            <label class="cursor-pointer relative">
              <input type="file" accept="image/*" class="hidden" (change)="onFileChange($event)" />
              <div class="w-20 h-20 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center overflow-hidden border-2 border-green-500">
                <img *ngIf="profilePicPreview" [src]="profilePicPreview" class="w-full h-full object-cover" />
                <i *ngIf="!profilePicPreview" class="fas fa-camera text-2xl text-gray-400"></i>
              </div>
              <div class="absolute bottom-0 right-0 w-6 h-6 bg-green-500 rounded-full flex items-center justify-center">
                <i class="fas fa-plus text-white text-xs"></i>
              </div>
            </label>
          </div>

          <!-- Email -->
          <div>
            <input type="email" formControlName="email" placeholder="Email *"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400" />
            <p *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
              class="text-red-500 text-xs mt-1">Valid email is required</p>
          </div>

          <!-- Phone Number -->
          <div>
            <input type="tel" formControlName="phoneNumber" placeholder="Phone Number *"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400" />
            <p *ngIf="registerForm.get('phoneNumber')?.touched && registerForm.get('phoneNumber')?.invalid"
              class="text-red-500 text-xs mt-1">Phone number is required</p>
          </div>

          <!-- Password -->
          <div>
            <input type="password" formControlName="password" placeholder="Password * (min 8 chars)"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400" />
            <p *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
              class="text-red-500 text-xs mt-1">Password must be at least 8 characters</p>
          </div>

          <!-- First & Last Name -->
          <div class="grid grid-cols-2 gap-3">
            <input type="text" formControlName="firstName" placeholder="First Name"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400" />
            <input type="text" formControlName="lastName" placeholder="Last Name"
              class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400" />
          </div>

          <!-- Display Name -->
          <input type="text" formControlName="displayName" placeholder="Display Name"
            class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400" />

          <!-- About -->
          <textarea formControlName="aboutText" placeholder="About (optional)" rows="2"
            class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 resize-none"></textarea>

          <button type="submit" [disabled]="registerForm.invalid"
            class="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:opacity-50 font-medium">
            Register
          </button>
        </form>

        <p class="text-center mt-4 text-sm text-gray-700 dark:text-gray-300">
          Already have an account?
          <a routerLink="/auth/login" class="text-green-600 dark:text-green-400 font-medium hover:underline">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
