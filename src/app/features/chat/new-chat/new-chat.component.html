<div class="h-full flex flex-col bg-white dark:bg-gray-800">
  <!-- Contact List View -->
  <ng-container *ngIf="!showAddContactForm">
    <!-- Header -->
    <div class="flex items-center gap-3 px-4 py-3 border-b dark:border-gray-700">
      <button (click)="closeNewChatView()" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100">
        <i class="fas fa-arrow-left text-lg"></i>
      </button>
      <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">New Chat</h2>
    </div>

    <!-- Search -->
    <div class="px-3 py-3 border-b dark:border-gray-700">
      <div class="relative">
        <input type="text" placeholder="Search contacts..."
          class="w-full px-4 py-2 pl-10 bg-gray-100 dark:bg-gray-700 rounded-lg outline-none text-sm"
          [(ngModel)]="searchTerm" />
        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 dark:text-gray-500"></i>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="px-3 py-2 space-y-1 border-b dark:border-gray-700">
      <button
        class="w-full flex items-center gap-3 px-3 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors"
        (click)="openNewGroup()">
        <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center flex-shrink-0">
          <i class="fas fa-users text-white"></i>
        </div>
        <span class="font-medium text-gray-900 dark:text-gray-100">New Group</span>
      </button>
      <button
        class="w-full flex items-center gap-3 px-3 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors"
        (click)="openNewContact()">
        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center flex-shrink-0">
          <i class="fas fa-user-plus text-white"></i>
        </div>
        <span class="font-medium text-gray-900 dark:text-gray-100">New Contact</span>
      </button>
    </div>

    <!-- Contact List -->
    <div class="flex-1 overflow-y-auto">
      <div *ngFor="let group of groupedContacts">
        <div class="px-4 py-2 bg-gray-50 dark:bg-gray-900 text-xs font-semibold text-gray-600 dark:text-gray-400 sticky top-0">
          {{ group.letter }}
        </div>
        <div *ngFor="let contact of group.contacts"
          class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer"
          (click)="startChatWithContact(contact)">
          <img [src]="contact.profilePictureUrl || 'assets/google.svg'" class="w-10 h-10 rounded-full" alt="avatar" />
          <div class="flex-1">
            <p class="font-medium text-sm text-gray-900 dark:text-gray-100">{{ contact.displayName }}</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">{{ contact.phoneNumber }}</p>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <!-- Add Contact Form View -->
  <ng-container *ngIf="showAddContactForm">
    <!-- Header -->
    <div class="flex items-center gap-3 px-4 py-3 border-b dark:border-gray-700">
      <button (click)="closeAddContactForm()" class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100">
        <i class="fas fa-arrow-left text-lg"></i>
      </button>
      <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Add New Contact</h2>
    </div>

    <!-- Form -->
    <div class="flex-1 overflow-y-auto p-6">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number *</label>
          <input type="tel" placeholder="+1234567890"
            class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-700 rounded-lg outline-none text-sm border-2 border-transparent focus:border-green-500"
            [(ngModel)]="newContactPhone" />
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Include country code (e.g., +1 for US)</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Display Name (Optional)</label>
          <input type="text" placeholder="John Doe"
            class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-700 rounded-lg outline-none text-sm border-2 border-transparent focus:border-green-500"
            [(ngModel)]="newContactName" />
        </div>

        <button (click)="addContact()" [disabled]="isAddingContact"
          class="w-full px-4 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors disabled:opacity-50 font-medium">
          {{ isAddingContact ? 'Adding Contact...' : 'Add Contact' }}
        </button>
      </div>
    </div>
  </ng-container>
</div>
