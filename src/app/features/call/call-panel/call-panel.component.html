<div *ngIf="activeCall; else noCall" class="relative flex flex-col h-full bg-gray-900 overflow-hidden">

  <!-- ── RINGING / CALLING state ── -->
  <div *ngIf="activeCall.callStatus === 'INITIATED' || activeCall.callStatus === 'RINGING'"
       class="absolute inset-0 flex flex-col items-center justify-center gap-6 z-20">
    <img [src]="remoteAvatar"
         class="w-32 h-32 rounded-full object-cover ring-4 ring-white/20 animate-pulse" alt="remote" />
    <h2 class="text-white text-2xl font-semibold">{{ remoteDisplayName }}</h2>
    <p class="text-gray-400 text-sm">{{ activeCall.callType === 'VIDEO' ? 'Video' : 'Voice' }} call · Calling...</p>
    <button (click)="endCall()"
            class="mt-4 w-16 h-16 rounded-full bg-red-500 hover:bg-red-600 text-white flex items-center justify-center shadow-lg transition-colors">
      <i class="fas fa-phone-slash text-2xl"></i>
    </button>
  </div>

  <!-- ── ANSWERED state ── -->
  <ng-container *ngIf="activeCall.callStatus === 'ANSWERED'">

    <!-- Remote video (fullscreen, video calls) -->
    <video #remoteVideo autoplay playsinline
           class="absolute inset-0 w-full h-full object-cover"
           [class.hidden]="activeCall.callType === 'VOICE'"></video>

    <!-- Voice call: remote avatar -->
    <div *ngIf="activeCall.callType === 'VOICE'"
         class="absolute inset-0 flex flex-col items-center justify-center gap-4">
      <img [src]="remoteAvatar"
           class="w-28 h-28 rounded-full object-cover ring-4 ring-white/20" alt="remote" />
      <h2 class="text-white text-2xl font-semibold">{{ remoteDisplayName }}</h2>
      <p class="text-green-400 text-sm">{{ formattedDuration }}</p>
    </div>

    <!-- Local video PiP -->
    <video #localVideo autoplay playsinline muted
           class="absolute top-4 right-4 w-28 h-40 rounded-xl object-cover border-2 border-white shadow-lg z-10"
           [class.hidden]="activeCall.callType === 'VOICE' || isVideoOff"></video>

    <!-- Top bar -->
    <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-4 py-3 bg-gradient-to-b from-black/60 to-transparent z-10">
      <div>
        <h3 class="text-white font-semibold">{{ remoteDisplayName }}</h3>
        <p class="text-green-400 text-xs">{{ formattedDuration }}</p>
      </div>
    </div>

    <!-- Bottom controls -->
    <div class="absolute bottom-0 left-0 right-0 flex items-center justify-center gap-6 pb-8 pt-4 bg-gradient-to-t from-black/70 to-transparent z-10">
      <button (click)="toggleMute()"
              [ngClass]="isMuted ? 'bg-white text-gray-900' : 'bg-white/20 text-white'"
              class="w-14 h-14 rounded-full flex items-center justify-center transition-colors">
        <i [class]="isMuted ? 'fas fa-microphone-slash text-xl' : 'fas fa-microphone text-xl'"></i>
      </button>
      <button *ngIf="activeCall.callType === 'VIDEO'" (click)="toggleVideo()"
              [ngClass]="isVideoOff ? 'bg-white text-gray-900' : 'bg-white/20 text-white'"
              class="w-14 h-14 rounded-full flex items-center justify-center transition-colors">
        <i [class]="isVideoOff ? 'fas fa-video-slash text-xl' : 'fas fa-video text-xl'"></i>
      </button>
      <button (click)="endCall()"
              class="w-16 h-16 rounded-full bg-red-500 hover:bg-red-600 text-white flex items-center justify-center shadow-lg transition-colors">
        <i class="fas fa-phone-slash text-2xl"></i>
      </button>
    </div>

  </ng-container>
</div>

<ng-template #noCall>
  <div class="flex flex-col items-center justify-center h-full bg-gray-50 dark:bg-gray-900 text-gray-500 dark:text-gray-400">
    <i class="fas fa-phone text-6xl mb-6 text-gray-300 dark:text-gray-600"></i>
    <h2 class="text-2xl font-light mb-2 text-gray-600 dark:text-gray-300">Make a call</h2>
    <p class="text-sm">Select a contact to start a call.</p>
  </div>
</ng-template>
